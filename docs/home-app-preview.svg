<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f5f0"/>
      <stop offset="1" stop-color="#d4e7e2"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef3f8"/>
      <stop offset="1" stop-color="#dfe8f0"/>
    </linearGradient>
    <filter id="phoneShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#143b33" flood-opacity="0.28"/>
    </filter>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1b2b4a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="720" height="520" fill="url(#canvas)"/>

  <!-- ===== iPhone ===== -->
  <g filter="url(#phoneShadow)">
    <rect x="244" y="12" width="232" height="496" rx="46" fill="#0c0c0e"/>
  </g>
  <rect x="252" y="20" width="216" height="480" rx="38" fill="url(#wall)"/>

  <!-- Dynamic Island -->
  <rect x="335" y="33" width="50" height="15" rx="7.5" fill="#000000"/>

  <!-- status bar -->
  <text x="272" y="46" fill="#1c1c1e" font-size="12" font-weight="600">9:41</text>
  <g fill="#1c1c1e">
    <rect x="420" y="38" width="3" height="7" rx="1"/>
    <rect x="425" y="36" width="3" height="9" rx="1"/>
    <rect x="430" y="34" width="3" height="11" rx="1"/>
    <path d="M438 38 a6 6 0 0 1 10 0" fill="none" stroke="#1c1c1e" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="443" cy="42.5" r="1.6"/>
    <rect x="452" y="36" width="14" height="8" rx="2.2" fill="none" stroke="#1c1c1e" stroke-width="1.4"/>
    <rect x="453.5" y="37.5" width="9" height="5" rx="1" fill="#1c1c1e"/>
  </g>

  <!-- title -->
  <text x="270" y="92" fill="#1c1c1e" font-size="23" font-weight="700">Salon</text>
  <text x="271" y="112" fill="#8a8a8e" font-size="11" font-weight="500">Czujnik Smogu</text>

  <!-- ===== tiles ===== -->
  <!-- A: Air Quality -->
  <g filter="url(#tileShadow)"><rect x="266" y="126" width="88" height="94" rx="20" fill="#ffffff"/></g>
  <circle cx="290" cy="152" r="13" fill="#34c759"/>
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M284 149 h7 a2.5 2.5 0 1 0 -2 -2.5"/>
    <path d="M284 153 h9 a2.5 2.5 0 1 1 -2 2.5"/>
    <path d="M284 157 h5"/>
  </g>
  <text x="280" y="192" fill="#1c1c1e" font-size="15" font-weight="700">Excellent</text>
  <text x="280" y="209" fill="#8a8a8e" font-size="10" font-weight="500">Air Quality</text>

  <!-- B: Temperature -->
  <g filter="url(#tileShadow)"><rect x="366" y="126" width="88" height="94" rx="20" fill="#ffffff"/></g>
  <circle cx="390" cy="152" r="13" fill="#ff9f0a"/>
  <rect x="387.5" y="145" width="5" height="9" rx="2.5" fill="#ffffff"/>
  <circle cx="390" cy="156" r="3.6" fill="#ffffff"/>
  <text x="380" y="193" fill="#1c1c1e" font-size="18" font-weight="700">21.4°</text>
  <text x="380" y="209" fill="#8a8a8e" font-size="10" font-weight="500">Temperature</text>

  <!-- C: Humidity -->
  <g filter="url(#tileShadow)"><rect x="266" y="232" width="88" height="94" rx="20" fill="#ffffff"/></g>
  <circle cx="290" cy="258" r="13" fill="#0a84ff"/>
  <path d="M290 250 c4 5 6.5 8 6.5 11 a6.5 6.5 0 1 1 -13 0 c0 -3 2.5 -6 6.5 -11 Z" fill="#ffffff"/>
  <text x="280" y="299" fill="#1c1c1e" font-size="18" font-weight="700">46%</text>
  <text x="280" y="315" fill="#8a8a8e" font-size="10" font-weight="500">Humidity</text>

  <!-- D: PM2.5 -->
  <g filter="url(#tileShadow)"><rect x="366" y="232" width="88" height="94" rx="20" fill="#ffffff"/></g>
  <circle cx="390" cy="258" r="13" fill="#34c759"/>
  <g fill="#ffffff"><circle cx="386" cy="255" r="2"/><circle cx="393" cy="253" r="1.6"/><circle cx="391" cy="261" r="1.8"/><circle cx="385" cy="261" r="1.4"/></g>
  <text x="380" y="299" fill="#1c1c1e" font-size="18" font-weight="700">8</text>
  <text x="380" y="315" fill="#8a8a8e" font-size="9.5" font-weight="500">PM2.5 µg/m³</text>

  <!-- wide tile: air quality detail -->
  <g filter="url(#tileShadow)"><rect x="266" y="338" width="188" height="96" rx="20" fill="#ffffff"/></g>
  <text x="282" y="361" fill="#8a8a8e" font-size="9" font-weight="600" letter-spacing="0.4">AIR QUALITY SENSOR</text>
  <circle cx="287" cy="381" r="5" fill="#34c759"/>
  <text x="298" y="386" fill="#1c1c1e" font-size="15" font-weight="700">Excellent</text>

  <text x="282" y="409" fill="#1c1c1e" font-size="10" font-weight="600">PM2.5</text>
  <rect x="322" y="403" width="92" height="6" rx="3" fill="#e6eaef"/>
  <rect x="322" y="403" width="15" height="6" rx="3" fill="#34c759"/>
  <text x="438" y="409" fill="#1c1c1e" font-size="10" font-weight="600" text-anchor="end">8</text>

  <text x="282" y="425" fill="#1c1c1e" font-size="10" font-weight="600">PM10</text>
  <rect x="322" y="419" width="92" height="6" rx="3" fill="#e6eaef"/>
  <rect x="322" y="419" width="22" height="6" rx="3" fill="#34c759"/>
  <text x="438" y="425" fill="#1c1c1e" font-size="10" font-weight="600" text-anchor="end">12</text>

  <!-- home indicator -->
  <rect x="336" y="486" width="48" height="4.5" rx="2.25" fill="#1c1c1e" opacity="0.35"/>
</svg>
