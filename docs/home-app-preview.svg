<svg width="820" height="820" viewBox="0 0 820 820" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9dde0"/>
      <stop offset="0.5" stop-color="#a7adb2"/>
      <stop offset="1" stop-color="#c5cacd"/>
    </linearGradient>
    <linearGradient id="wp" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#5c93c9"/>
      <stop offset="0.42" stop-color="#9fb6bd"/>
      <stop offset="0.72" stop-color="#e2b277"/>
      <stop offset="1" stop-color="#cf8a47"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g transform="translate(210,0)">
  <!-- phone body -->
  <rect x="6" y="6" width="388" height="808" rx="74" fill="url(#frame)"/>
  <rect x="13" y="13" width="374" height="794" rx="67" fill="#000000"/>
  <rect x="20" y="20" width="360" height="780" rx="60" fill="url(#wp)"/>

  <!-- dynamic island -->
  <rect x="162" y="34" width="76" height="25" rx="12.5" fill="#000000"/>

  <!-- status bar -->
  <text x="46" y="52" fill="#ffffff" font-size="15" font-weight="600">9:41</text>
  <g fill="#ffffff">
    <rect x="300" y="44" width="3.2" height="8" rx="1"/>
    <rect x="306" y="41.5" width="3.2" height="10.5" rx="1"/>
    <rect x="312" y="39" width="3.2" height="13" rx="1"/>
    <rect x="318" y="37" width="3.2" height="15" rx="1"/>
    <path d="M329 44 a8 8 0 0 1 14 0" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="336" cy="49.5" r="2"/>
    <rect x="350" y="40" width="20" height="11" rx="3" fill="none" stroke="#ffffff" stroke-width="1.6"/>
    <rect x="352" y="42" width="13" height="7" rx="1.5" fill="#ffffff"/>
    <rect x="371" y="43" width="1.8" height="5" rx="0.9" fill="#ffffff"/>
  </g>

  <!-- title + add button -->
  <text x="40" y="116" fill="#ffffff" font-size="30" font-weight="700" filter="url(#ds)">My Home</text>
  <rect x="282" y="86" width="78" height="34" rx="17" fill="#ffffff" fill-opacity="0.28"/>
  <line x1="307" y1="103" x2="319" y2="103" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="313" y1="97" x2="313" y2="109" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <g fill="#ffffff"><circle cx="335" cy="103" r="2"/><circle cx="343" cy="103" r="2"/><circle cx="351" cy="103" r="2"/></g>

  <!-- status pills -->
  <g>
    <rect x="40" y="138" width="146" height="38" rx="19" fill="#ffffff" fill-opacity="0.26"/>
    <circle cx="62" cy="157" r="11" fill="#34c759"/>
    <g stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" fill="none">
      <path d="M57 154 h6 a2 2 0 1 0 -1.6 -2"/>
      <path d="M57 158 h7.5 a2 2 0 1 1 -1.6 2"/>
    </g>
    <text x="80" y="162" fill="#ffffff" font-size="14" font-weight="600">Air Quality</text>

    <rect x="196" y="138" width="110" height="38" rx="19" fill="#ffffff" fill-opacity="0.26"/>
    <circle cx="218" cy="157" r="11" fill="#ff9f0a"/>
    <rect x="215.5" y="151" width="5" height="8" rx="2.5" fill="#ffffff"/>
    <circle cx="218" cy="161" r="3.2" fill="#ffffff"/>
    <text x="236" y="162" fill="#ffffff" font-size="14" font-weight="600">Climate</text>
  </g>

  <!-- room header -->
  <text x="40" y="216" fill="#ffffff" font-size="20" font-weight="700" filter="url(#ds)">Living Room ›</text>

  <!-- accessory tiles -->
  <!-- Air quality -->
  <rect x="40" y="234" width="320" height="78" rx="20" fill="#ffffff" fill-opacity="0.62"/>
  <rect x="52" y="244" width="58" height="58" rx="16" fill="#34c759"/>
  <g stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" fill="none">
    <path d="M70 266 h14 a4 4 0 1 0 -3 -4"/>
    <path d="M70 273 h18 a4 4 0 1 1 -3 4"/>
    <path d="M70 280 h11"/>
  </g>
  <text x="124" y="270" fill="#1c1c1e" font-size="17" font-weight="700">Czujnik Smogu</text>
  <text x="124" y="291" fill="#3c3c43" fill-opacity="0.7" font-size="13" font-weight="500">Air Quality · Excellent</text>

  <!-- Temperature -->
  <rect x="40" y="322" width="154" height="118" rx="20" fill="#ffffff" fill-opacity="0.62"/>
  <circle cx="68" cy="350" r="15" fill="#ff9f0a"/>
  <rect x="65" y="342" width="6" height="10" rx="3" fill="#ffffff"/>
  <circle cx="68" cy="354" r="4" fill="#ffffff"/>
  <text x="58" y="400" fill="#1c1c1e" font-size="30" font-weight="700">21.4°</text>
  <text x="58" y="422" fill="#3c3c43" fill-opacity="0.7" font-size="13" font-weight="500">Temperature</text>

  <!-- Humidity -->
  <rect x="206" y="322" width="154" height="118" rx="20" fill="#ffffff" fill-opacity="0.62"/>
  <circle cx="234" cy="350" r="15" fill="#0a84ff"/>
  <path d="M234 341 c4.6 5.6 7.5 9 7.5 12.2 a7.5 7.5 0 1 1 -15 0 c0 -3.2 2.9 -6.6 7.5 -12.2 Z" fill="#ffffff"/>
  <text x="224" y="400" fill="#1c1c1e" font-size="30" font-weight="700">46%</text>
  <text x="224" y="422" fill="#3c3c43" fill-opacity="0.7" font-size="13" font-weight="500">Humidity</text>

  <!-- particulate detail tile -->
  <rect x="40" y="450" width="320" height="96" rx="20" fill="#ffffff" fill-opacity="0.62"/>
  <text x="58" y="475" fill="#3c3c43" fill-opacity="0.6" font-size="11" font-weight="600" letter-spacing="0.4">PARTICULATE MATTER</text>
  <text x="58" y="500" fill="#1c1c1e" font-size="13" font-weight="600">PM2.5</text>
  <rect x="110" y="493" width="180" height="7" rx="3.5" fill="#1c1c1e" fill-opacity="0.1"/>
  <rect x="110" y="493" width="29" height="7" rx="3.5" fill="#34c759"/>
  <text x="342" y="500" fill="#1c1c1e" font-size="13" font-weight="600" text-anchor="end">8 µg/m³</text>
  <text x="58" y="525" fill="#1c1c1e" font-size="13" font-weight="600">PM10</text>
  <rect x="110" y="518" width="180" height="7" rx="3.5" fill="#1c1c1e" fill-opacity="0.1"/>
  <rect x="110" y="518" width="43" height="7" rx="3.5" fill="#34c759"/>
  <text x="342" y="525" fill="#1c1c1e" font-size="13" font-weight="600" text-anchor="end">12 µg/m³</text>

  <!-- bottom tab bar -->
  <rect x="120" y="724" width="160" height="56" rx="28" fill="#ffffff" fill-opacity="0.3"/>
  <g>
    <path d="M150 748 l9 -8 l9 8 v9 a1 1 0 0 1 -1 1 h-16 a1 1 0 0 1 -1 -1 Z" fill="#ffffff"/>
    <text x="159" y="772" fill="#ffffff" font-size="9" font-weight="600" text-anchor="middle">Home</text>
    <circle cx="200" cy="750" r="9" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2"/>
    <path d="M200 745 v5 l3 3" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2" stroke-linecap="round"/>
    <text x="200" y="772" fill="#ffffff" fill-opacity="0.85" font-size="9" font-weight="500" text-anchor="middle">Automation</text>
    <path d="M241 743 l2.2 4.6 l5 0.5 l-3.8 3.3 l1.2 4.9 l-4.6 -2.6 l-4.6 2.6 l1.2 -4.9 l-3.8 -3.3 l5 -0.5 Z" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.6" stroke-linejoin="round"/>
    <text x="241" y="772" fill="#ffffff" fill-opacity="0.85" font-size="9" font-weight="500" text-anchor="middle">Discover</text>
  </g>

  <!-- home indicator -->
  <rect x="160" y="788" width="80" height="5" rx="2.5" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
