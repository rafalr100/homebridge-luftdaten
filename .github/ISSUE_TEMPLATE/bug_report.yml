name: Bug report
description: Report a problem with the plugin
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: e.g. 2.0.1
    validations:
      required: true
  - type: input
    id: homebridge
    attributes:
      label: Homebridge version
      placeholder: e.g. 1.8.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Your platform/sensor config. Remove any secrets first.
      render: json
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Homebridge logs
      description: Paste the log lines around the problem (enable debug logging if possible).
      render: shell
    validations:
      required: false
